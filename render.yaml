services:
  - type: web
    name: signaturehub
    runtime: node
    region: oregon
    plan: starter          # Free tier sleeps after 15min inactivity — use starter ($7/mo) for production
    buildCommand: "npm install && npm run build --workspace client"
    startCommand: "node server/src/index.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false         # REQUIRED — set to your MongoDB Atlas connection string
      - key: JWT_SECRET
        generateValue: true # Render auto-generates a secure random value
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false         # REQUIRED — set to your Render URL e.g. https://signaturehub.onrender.com
      - key: ADMIN_PASSWORD
        sync: false         # REQUIRED — set a strong password for the local login
      - key: REDIS_URL
        sync: false         # Optional — leave blank to run without cache
      # Microsoft Azure AD — required for SSO login
      - key: AZURE_TENANT_ID
        value: bb3bcb8b-6acb-4a83-bfb6-d484f67ba0b2
      - key: AZURE_CLIENT_ID
        value: 5e0a49a2-7937-4b3d-b365-42efda4ab0b9
      - key: AZURE_CLIENT_SECRET
        sync: false         # REQUIRED — paste your Azure client secret VALUE (not the ID)
      - key: AZURE_REDIRECT_URI
        sync: false         # REQUIRED — set to https://your-render-url.onrender.com/api/auth/callback
      # Optional — Outlook add-in API key
      - key: API_KEY
        generateValue: true
